---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: dnsupstreampools.dns.astradns.com
spec:
  group: dns.astradns.com
  names:
    kind: DNSUpstreamPool
    listKind: DNSUpstreamPoolList
    plural: dnsupstreampools
    shortNames:
    - dnsup
    singular: dnsupstreampool
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .spec.loadBalancing.strategy
      name: Strategy
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: DNSUpstreamPool is a pool of upstream DNS resolvers.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DNSUpstreamPoolSpec defines the desired state of DNSUpstreamPool.
            properties:
              dnssec:
                description: DNSSEC configures resolver DNSSEC processing mode.
                properties:
                  mode:
                    default: "off"
                    description: Mode controls DNSSEC behavior for supported engines.
                    enum:
                    - "off"
                    - process
                    - validate
                    type: string
                type: object
              domainFilter:
                description: DomainFilter configures proxy-level domain allow/deny
                  filtering.
                properties:
                  action:
                    default: refused
                    description: 'Action determines the DNS response code for denied
                      queries: refused or nxdomain.'
                    enum:
                    - refused
                    - nxdomain
                    type: string
                  allow:
                    description: |-
                      Allow is a list of domain patterns that are permitted.
                      If non-empty, only domains matching at least one pattern are allowed.
                      Patterns support wildcards: "*.example.com" matches any subdomain.
                    items:
                      type: string
                    type: array
                  deny:
                    description: |-
                      Deny is a list of domain patterns that are blocked.
                      Deny rules are evaluated after allow rules; a domain matching both is denied.
                    items:
                      type: string
                    type: array
                type: object
              healthCheck:
                description: HealthCheck configures health checking for upstreams.
                properties:
                  enabled:
                    default: true
                    description: Enabled enables periodic health checks. Defaults
                      to true.
                    type: boolean
                  failureThreshold:
                    default: 3
                    description: FailureThreshold is the number of consecutive failures
                      before marking unhealthy. Defaults to 3.
                    format: int32
                    minimum: 1
                    type: integer
                  intervalSeconds:
                    default: 30
                    description: IntervalSeconds is the time between health checks.
                      Defaults to 30.
                    format: int32
                    minimum: 1
                    type: integer
                  timeoutSeconds:
                    default: 5
                    description: TimeoutSeconds is the health check timeout. Defaults
                      to 5.
                    format: int32
                    minimum: 1
                    type: integer
                type: object
              loadBalancing:
                description: LoadBalancing configures how queries are distributed
                  across upstreams.
                properties:
                  strategy:
                    default: round-robin
                    description: 'Strategy is the load balancing algorithm: round-robin,
                      first-available, or random.'
                    enum:
                    - round-robin
                    - first-available
                    - random
                    type: string
                type: object
              runtime:
                description: Runtime configures engine runtime tuning.
                properties:
                  workerThreads:
                    description: |-
                      WorkerThreads is the number of worker threads to configure on supported engines.
                      When omitted, the runtime selects a CPU-based default.
                    format: int32
                    maximum: 256
                    minimum: 1
                    type: integer
                type: object
              upstreams:
                description: Upstreams is the list of upstream DNS resolvers.
                items:
                  description: Upstream defines a single upstream DNS resolver.
                  properties:
                    address:
                      description: Address is the IP address or hostname of the upstream
                        resolver.
                      maxLength: 253
                      minLength: 1
                      pattern: ^[A-Za-z0-9]([A-Za-z0-9.:-]*[A-Za-z0-9])?$
                      type: string
                    port:
                      description: |-
                        Port is the port number of the upstream resolver.
                        When omitted, defaults are transport-specific (53 for dns, 853 for dot, 443 for doh).
                      format: int32
                      maximum: 65535
                      minimum: 1
                      type: integer
                    preference:
                      default: 100
                      description: Preference is the upstream priority hint. Lower
                        values are preferred.
                      format: int32
                      maximum: 1000
                      minimum: 1
                      type: integer
                    tlsServerName:
                      description: TLSServerName overrides SNI/hostname verification
                        for TLS-based transports.
                      maxLength: 253
                      pattern: ^$|^[A-Za-z0-9]([A-Za-z0-9.-]*[A-Za-z0-9])?$
                      type: string
                    transport:
                      default: dns
                      description: 'Transport selects upstream protocol transport:
                        dns, dot, or doh.'
                      enum:
                      - dns
                      - dot
                      - doh
                      type: string
                    weight:
                      default: 1
                      description: Weight is the relative upstream weight.
                      format: int32
                      maximum: 100
                      minimum: 1
                      type: integer
                  required:
                  - address
                  type: object
                minItems: 1
                type: array
            required:
            - upstreams
            type: object
          status:
            description: DNSUpstreamPoolStatus defines the observed state of DNSUpstreamPool.
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the pool's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: ObservedGeneration is the most recent generation acted
                  on by the controller.
                format: int64
                type: integer
              upstreamStatuses:
                description: UpstreamStatuses contains the health status of each upstream.
                items:
                  description: UpstreamStatus represents the observed state of a single
                    upstream.
                  properties:
                    address:
                      description: Address is the upstream address.
                      type: string
                    healthy:
                      description: Healthy indicates whether the upstream is responding
                        to health checks.
                      type: boolean
                    latencyMs:
                      description: LatencyMs is the last measured latency in milliseconds.
                      format: int64
                      type: integer
                  required:
                  - address
                  - healthy
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
