apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
  annotations:
    cert-manager.io/inject-ca-from: system/serving-cert
webhooks:
  - admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: webhook-service
        namespace: system
        path: /validate-dns-astradns-com-v1alpha1-dnsupstreampool
    failurePolicy: Fail
    matchPolicy: Equivalent
    name: vdnsupstreampool.kb.io
    rules:
      - apiGroups:
          - dns.astradns.com
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
        resources:
          - dnsupstreampools
    sideEffects: None
    timeoutSeconds: 5
