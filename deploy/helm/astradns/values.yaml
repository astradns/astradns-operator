# -- Override the chart name
nameOverride: ""
# -- Override the full release name
fullnameOverride: ""

# -- Namespace to deploy into (defaults to .Release.Namespace)
namespace: ""

# -- Image pull secrets for private registries
imagePullSecrets: []

operator:
  image:
    repository: ghcr.io/astradns/astradns-operator
    tag: ""  # Defaults to v<appVersion>
    pullPolicy: IfNotPresent
  replicas: 1
  # -- Enable leader election for HA operator deployments
  leaderElect: true
  leaderElection:
    # -- Lease identity used by controller-runtime leader election.
    id: 60acac32.astradns.com
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  # -- Node selector for operator pods
  nodeSelector: {}
  # -- Tolerations for operator pods
  tolerations: []
  # -- Affinity rules for operator pods
  affinity: {}
  # -- Additional labels for operator pods
  podLabels: {}
  # -- Additional annotations for operator pods
  podAnnotations: {}
  # -- Priority class for operator pods. Uses built-in Kubernetes critical class by default.
  priorityClassName: system-cluster-critical
  pdb:
    # -- Create PodDisruptionBudget for operator deployment.
    enabled: true
    # -- Minimum available operator pods during voluntary disruptions.
    minAvailable: 1
  serviceAccount:
    # -- Annotations for the operator service account
    annotations: {}
    # -- Mount service account token in operator pods for in-cluster API auth.
    automountServiceAccountToken: true
  startupProbe:
    # -- Enable startup probe for the operator manager container.
    enabled: true
    # -- HTTP path used by startup probe.
    path: /readyz
    # -- Probe period in seconds.
    periodSeconds: 5
    # -- Probe timeout in seconds.
    timeoutSeconds: 3
    # -- Number of consecutive failures before startup probe fails.
    failureThreshold: 24
  lifecycle:
    preStop:
      # -- Enable lifecycle preStop hook for graceful drain on shutdown.
      enabled: true
      # -- Number of seconds to sleep during preStop.
      sleepSeconds: 5

agent:
  image:
    repository: ghcr.io/astradns/astradns-agent
    tag: "v0.2.5"  # Defaults to a published stable tag. Set empty to use v<appVersion>.
    pullPolicy: IfNotPresent
  # -- Optional engine-specific image overrides keyed by engine type.
  # -- When repository is empty for the selected engine, chart falls back to agent.image with -<engine> tag suffix.
  engineImages:
    unbound:
      repository: ""
      tag: ""
    coredns:
      repository: ""
      tag: ""
    powerdns:
      repository: ""
      tag: ""
    bind:
      repository: ""
      tag: ""
  # -- DNS engine type: unbound, coredns, powerdns, or bind
  engineType: unbound
  topology:
    # -- Deployment topology: node-local (DaemonSet) or central (Deployment + Service).
    # -- node-local: one agent per node with link-local or hostPort networking.
    # -- central: fixed replica count behind a ClusterIP Service.
    profile: node-local
  network:
    # -- Data-path mode for agent DNS listener: hostPort or linkLocal
    mode: hostPort
    # -- Link-local IP used when mode=linkLocal
    linkLocalIP: 169.254.20.11
  # -- Log mode: sampled or full
  logMode: sampled
  # -- Log sample rate when logMode is sampled
  logSampleRate: "0.1"
  # -- Timeout for proxy forwarding to local engine (Go duration).
  proxyTimeout: 2s
  # -- Max DNS responses cached at proxy layer before forwarding to engine.
  proxyCacheMaxEntries: 10000
  # -- Fallback TTL for proxy cache entries without record TTL.
  proxyCacheDefaultTTL: 30s
  # -- Max reusable DNS connections per protocol to local engine.
  engineConnectionPoolSize: 64
  # -- Debounce delay before processing config watch updates.
  configWatchDebounce: 1s
  # -- Interval to probe and auto-restart crashed engine subprocesses.
  engineRecoveryInterval: 5s
  # -- Buffer size for component error channel.
  componentErrorBuffer: 5
  metrics:
    # -- Optional bearer token required for /metrics access (empty disables token check).
    bearerToken: ""
  diagnostics:
    # -- Enable external endpoint diagnostics report at /diagnostics.
    enabled: false
    # -- Comma-separated diagnostic targets (e.g. s3.us-west-004.backblazeb2.com).
    targets: ""
    # -- Interval between diagnostics probe cycles.
    interval: 1m
    # -- Timeout for each diagnostics probe stage.
    timeout: 3s
  tracing:
    # -- Enable OpenTelemetry tracing for agent control-plane operations.
    enabled: false
    # -- OTLP/HTTP collector endpoint used by the agent tracer.
    endpoint: localhost:4318
    # -- Use insecure OTLP transport (plaintext HTTP).
    insecure: true
    # -- Trace sampling ratio between 0 and 1.
    sampleRatio: "0.1"
    # -- Service name used by OpenTelemetry traces.
    serviceName: astradns-agent
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  # -- Node selector for agent pods
  nodeSelector: {}
  # -- Tolerations for agent pods
  tolerations: []
  # -- Affinity rules for agent pods (anti-affinity is implicit via DaemonSet)
  affinity: {}
  # -- Additional labels for agent pods
  podLabels: {}
  # -- Additional annotations for agent pods
  podAnnotations: {}
  # -- Priority class for agent pods. Uses built-in Kubernetes critical class by default.
  priorityClassName: system-cluster-critical
  pdb:
    # -- Create PodDisruptionBudget for agent pods.
    enabled: true
    # -- Maximum unavailable agent pods during voluntary disruptions (node-local mode).
    # -- In central mode, minAvailable: 1 is used instead.
    maxUnavailable: 10%
  serviceAccount:
    # -- Annotations for the agent service account
    annotations: {}
    # -- Mount service account token in agent pods. Disable when API access is not needed.
    automountServiceAccountToken: false
  # -- Central-mode Deployment settings (ignored when profile=node-local).
  deployment:
    # -- Number of agent replicas in central mode.
    replicas: 3
    # -- Deployment strategy for central mode.
    strategy:
      type: RollingUpdate
    # -- Topology spread constraints for central mode. labelSelector is auto-injected.
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
  # -- DNS Service settings for central mode (ignored when profile=node-local).
  dnsService:
    # -- Service type.
    type: ClusterIP
    # -- Optional fixed ClusterIP for the central DNS Service.
    # -- Set this to a reserved Service IP (for example 10.96.0.53) to keep
    # -- CoreDNS forward target stable across service recreation events.
    # -- Leave empty to let Kubernetes allocate it dynamically.
    clusterIP: ""
    # -- DNS port exposed by the Service.
    port: 53
    # -- Session affinity to keep DNS cache warm per client IP.
    sessionAffinity: ClientIP
    # -- Session affinity timeout in seconds.
    sessionAffinityTimeoutSeconds: 1800

crds:
  # -- Install CRDs with the chart
  install: true

serviceMonitor:
  # -- Create a ServiceMonitor for Prometheus Operator
  enabled: false
  # -- Additional labels for the ServiceMonitor
  labels: {}
  # -- Scrape interval
  interval: 30s
  # -- Scrape timeout
  scrapeTimeout: 10s

networkPolicy:
  # -- Create NetworkPolicies for operator and agent pods.
  enabled: true
  metricsNamespaceSelector:
    # -- Namespace label key allowed to scrape metrics.
    label: metrics
    # -- Namespace label value allowed to scrape metrics.
    value: enabled

webhook:
  # -- Enable validating webhook that enforces one DNSUpstreamPool per namespace
  enabled: false
  # -- Timeout for webhook calls in seconds.
  timeoutSeconds: 5
  certManager:
    issuerRef:
      # -- Existing Issuer/ClusterIssuer name used to sign the webhook certificate
      name: ""
      # -- Issuer kind (Issuer or ClusterIssuer)
      kind: ClusterIssuer
      # -- Issuer API group
      group: cert-manager.io

clusterDNS:
  # -- Cluster DNS provider that forwards external traffic to AstraDNS. Only coredns is currently supported.
  provider: coredns
  forwardExternalToAstraDNS:
    # -- Patch existing cluster DNS config to forward external DNS to AstraDNS.
    enabled: false
    # -- Namespace where the cluster DNS ConfigMap/deployment live.
    namespace: kube-system
    # -- Cluster DNS ConfigMap name.
    configMapName: coredns
    # -- Cluster DNS deployment to restart after patching (empty disables restart).
    rolloutDeployment: coredns
    # -- Upstream target injected into DNS forward stanza (host:port or [ipv6]:port)
    # -- for node-local profile. In central profile, the chart computes the target
    # -- automatically from agent.dnsService.clusterIP (preferred) or service discovery.
    forwardTarget: 169.254.20.11:5353
    # -- Fallback upstream used when AstraDNS agent is unreachable.
    # -- CoreDNS tries AstraDNS first and falls back to this target automatically.
    # -- Set to empty string to disable fallback (not recommended).
    fallbackUpstream: /etc/resolv.conf
    # -- Kubectl image used by patch job.
    kubectlImage: bitnami/kubectl:1.31.4
    # -- Image pull policy for cluster DNS patch job (Always, IfNotPresent, Never).
    kubectlImagePullPolicy: IfNotPresent
    # -- Resource requests/limits for cluster DNS patch job.
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi

grafana:
  dashboards:
    # -- Create a ConfigMap with the Grafana dashboard JSON for sidecar discovery
    enabled: false
    # -- Additional labels for the dashboard ConfigMap
    labels: {}
