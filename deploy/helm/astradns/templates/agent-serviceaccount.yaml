apiVersion: v1
kind: ServiceAccount
automountServiceAccountToken: {{ .Values.agent.serviceAccount.automountServiceAccountToken }}
metadata:
  name: {{ include "astradns.fullname" . }}-agent
  namespace: {{ include "astradns.namespace" . }}
  labels:
    {{- include "astradns.agent.labels" . | nindent 4 }}
  {{- with .Values.agent.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
