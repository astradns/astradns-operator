apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "astradns.fullname" . }}-leader-election
  namespace: {{ include "astradns.namespace" . }}
  labels:
    {{- include "astradns.operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "astradns.fullname" . }}-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ include "astradns.fullname" . }}-operator
    namespace: {{ include "astradns.namespace" . }}
