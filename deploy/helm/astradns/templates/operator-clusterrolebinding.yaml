apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "astradns.fullname" . }}-operator
  labels:
    {{- include "astradns.operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "astradns.fullname" . }}-operator
subjects:
  - kind: ServiceAccount
    name: {{ include "astradns.fullname" . }}-operator
    namespace: {{ include "astradns.namespace" . }}
