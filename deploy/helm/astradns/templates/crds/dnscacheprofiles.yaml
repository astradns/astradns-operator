{{- if .Values.crds.install }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: dnscacheprofiles.dns.astradns.com
  labels:
    {{- include "astradns.labels" . | nindent 4 }}
spec:
  group: dns.astradns.com
  names:
    kind: DNSCacheProfile
    listKind: DNSCacheProfileList
    plural: dnscacheprofiles
    singular: dnscacheprofile
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: DNSCacheProfile configures DNS cache behavior.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DNSCacheProfileSpec defines the desired state of DNSCacheProfile.
            properties:
              maxEntries:
                description: MaxEntries is the maximum number of cache entries. Defaults
                  to 100000.
                format: int32
                type: integer
              negativeTtl:
                description: NegativeTtl configures TTL for negative responses (NXDOMAIN).
                properties:
                  seconds:
                    description: Seconds is the TTL for negative cache entries. Defaults
                      to 30.
                    format: int32
                    type: integer
                type: object
              positiveTtl:
                description: PositiveTtl configures TTL bounds for successful responses.
                properties:
                  maxSeconds:
                    description: MaxSeconds is the maximum TTL in seconds. Defaults
                      to 300.
                    format: int32
                    type: integer
                  minSeconds:
                    description: MinSeconds is the minimum TTL in seconds. Defaults
                      to 60.
                    format: int32
                    type: integer
                type: object
              prefetch:
                description: Prefetch configures cache prefetching.
                properties:
                  enabled:
                    description: Enabled enables cache prefetching.
                    type: boolean
                  threshold:
                    description: Threshold is the number of queries before a record
                      is prefetched. Defaults to 10.
                    format: int32
                    type: integer
                type: object
            type: object
          status:
            description: DNSCacheProfileStatus defines the observed state of DNSCacheProfile.
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the profile's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
