---
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  labels:
    {{- include "astradns.labels" . | nindent 4 }}
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: dnsupstreampools.dns.astradns.com
spec:
  group: dns.astradns.com
  names:
    kind: DNSUpstreamPool
    listKind: DNSUpstreamPoolList
    plural: dnsupstreampools
    singular: dnsupstreampool
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: DNSUpstreamPool is a pool of upstream DNS resolvers.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DNSUpstreamPoolSpec defines the desired state of DNSUpstreamPool.
            properties:
              healthCheck:
                description: HealthCheck configures health checking for upstreams.
                properties:
                  enabled:
                    default: true
                    description: Enabled enables periodic health checks. Defaults
                      to true.
                    type: boolean
                  failureThreshold:
                    default: 3
                    description: FailureThreshold is the number of consecutive failures
                      before marking unhealthy. Defaults to 3.
                    format: int32
                    minimum: 1
                    type: integer
                  intervalSeconds:
                    default: 30
                    description: IntervalSeconds is the time between health checks.
                      Defaults to 30.
                    format: int32
                    minimum: 1
                    type: integer
                  timeoutSeconds:
                    default: 5
                    description: TimeoutSeconds is the health check timeout. Defaults
                      to 5.
                    format: int32
                    minimum: 1
                    type: integer
                type: object
              loadBalancing:
                description: LoadBalancing configures how queries are distributed
                  across upstreams.
                properties:
                  strategy:
                    default: round-robin
                    description: 'Strategy is the load balancing algorithm: round-robin,
                      first-available, or random.'
                    enum:
                    - round-robin
                    - first-available
                    - random
                    type: string
                type: object
              upstreams:
                description: Upstreams is the list of upstream DNS resolvers.
                items:
                  description: Upstream defines a single upstream DNS resolver.
                  properties:
                    address:
                      description: Address is the IP address or hostname of the upstream
                        resolver.
                      minLength: 1
                      type: string
                    port:
                      default: 53
                      description: Port is the port number of the upstream resolver.
                        Defaults to 53.
                      format: int32
                      maximum: 65535
                      minimum: 1
                      type: integer
                  required:
                  - address
                  type: object
                minItems: 1
                type: array
            required:
            - upstreams
            type: object
          status:
            description: DNSUpstreamPoolStatus defines the observed state of DNSUpstreamPool.
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the pool's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              upstreamStatuses:
                description: UpstreamStatuses contains the health status of each upstream.
                items:
                  description: UpstreamStatus represents the observed state of a single
                    upstream.
                  properties:
                    address:
                      description: Address is the upstream address.
                      type: string
                    healthy:
                      description: Healthy indicates whether the upstream is responding
                        to health checks.
                      type: boolean
                    latencyMs:
                      description: LatencyMs is the last measured latency in milliseconds.
                      format: int64
                      type: integer
                  required:
                  - address
                  - healthy
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
