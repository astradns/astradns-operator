{{- if .Values.grafana.dashboards.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "astradns.fullname" . }}-grafana-dashboard
  namespace: {{ include "astradns.namespace" . }}
  labels:
    {{- include "astradns.labels" . | nindent 4 }}
    grafana_dashboard: "1"
    {{- with .Values.grafana.dashboards.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
data:
  astradns-overview.json: |-
    {{- .Files.Get "dashboards/astradns-overview.json" | nindent 4 }}
{{- end }}
