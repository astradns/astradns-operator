{{- if .Values.clusterDNS.forwardExternalToAstraDNS.enabled }}
{{- $profile := include "astradns.agent.topology.profile" . }}
{{- if and (eq $profile "node-local") (ne (include "astradns.agent.network.mode" .) "linkLocal") }}
{{- fail "clusterDNS.forwardExternalToAstraDNS with profile=node-local requires agent.network.mode=linkLocal" }}
{{- end }}
{{- if ne (lower .Values.clusterDNS.provider) "coredns" }}
{{- fail "clusterDNS.forwardExternalToAstraDNS currently supports only clusterDNS.provider=coredns" }}
{{- end }}
{{- $clusterDNSNamespace := trim .Values.clusterDNS.forwardExternalToAstraDNS.namespace }}
{{- $clusterDNSConfigMapName := trim .Values.clusterDNS.forwardExternalToAstraDNS.configMapName }}
{{- $clusterDNSForwardTarget := trim .Values.clusterDNS.forwardExternalToAstraDNS.forwardTarget }}
{{- $centralForwardTarget := include "astradns.agent.centralForwardTarget" . | trim }}
{{- $centralServiceName := include "astradns.agent.dnsServiceName" . }}
{{- $centralServiceNamespace := include "astradns.namespace" . }}
{{- $centralServicePort := toString (default 53 .Values.agent.dnsService.port) }}
{{- $autoResolveCentralForwardTarget := false }}
{{- if eq $profile "central" }}
{{- $clusterDNSForwardTarget = $centralForwardTarget }}
{{- if eq $centralForwardTarget "" }}
{{- $autoResolveCentralForwardTarget = true }}
{{- end }}
{{- end }}
{{- $clusterDNSFallbackUpstream := trim (default "" .Values.clusterDNS.forwardExternalToAstraDNS.fallbackUpstream) }}
{{- $clusterDNSRolloutDeployment := trim .Values.clusterDNS.forwardExternalToAstraDNS.rolloutDeployment }}
{{- $clusterDNSKubectlImage := trim .Values.clusterDNS.forwardExternalToAstraDNS.kubectlImage }}
{{- $clusterDNSKubectlImagePullPolicy := trim .Values.clusterDNS.forwardExternalToAstraDNS.kubectlImagePullPolicy }}
{{- $dnsLabelPattern := "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$" }}
{{- $dnsSubdomainPattern := "^[a-z0-9]([-a-z0-9]*[a-z0-9])?([.][a-z0-9]([-a-z0-9]*[a-z0-9])?)*$" }}
{{- if eq $clusterDNSNamespace "" }}
{{- fail "clusterDNS.forwardExternalToAstraDNS.namespace must not be empty" }}
{{- end }}
{{- if not (regexMatch $dnsLabelPattern $clusterDNSNamespace) }}
{{- fail "clusterDNS.forwardExternalToAstraDNS.namespace must be a valid DNS-1123 label" }}
{{- end }}
{{- if eq $clusterDNSConfigMapName "" }}
{{- fail "clusterDNS.forwardExternalToAstraDNS.configMapName must not be empty" }}
{{- end }}
{{- if not (regexMatch $dnsSubdomainPattern $clusterDNSConfigMapName) }}
{{- fail "clusterDNS.forwardExternalToAstraDNS.configMapName must be a valid Kubernetes resource name" }}
{{- end }}
{{- if and (not $autoResolveCentralForwardTarget) (eq $clusterDNSForwardTarget "") }}
{{- fail "clusterDNS.forwardExternalToAstraDNS.forwardTarget must not be empty" }}
{{- end }}
{{- if and (not $autoResolveCentralForwardTarget) (not (or (regexMatch "^\\[[^\\]]+\\]:[0-9]+$" $clusterDNSForwardTarget) (regexMatch "^[^[:space:]:]+:[0-9]+$" $clusterDNSForwardTarget))) }}
{{- fail "clusterDNS.forwardExternalToAstraDNS.forwardTarget must use host:port (or [ipv6]:port) format" }}
{{- end }}
{{- if eq $clusterDNSKubectlImage "" }}
{{- fail "clusterDNS.forwardExternalToAstraDNS.kubectlImage must not be empty" }}
{{- end }}
{{- if and $clusterDNSRolloutDeployment (not (regexMatch $dnsSubdomainPattern $clusterDNSRolloutDeployment)) }}
{{- fail "clusterDNS.forwardExternalToAstraDNS.rolloutDeployment must be a valid Kubernetes resource name when set" }}
{{- end }}
{{- if not (has $clusterDNSKubectlImagePullPolicy (list "Always" "IfNotPresent" "Never")) }}
{{- fail "clusterDNS.forwardExternalToAstraDNS.kubectlImagePullPolicy must be one of: Always, IfNotPresent, Never" }}
{{- end }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "astradns.fullname" . }}-coredns-patch
  namespace: {{ include "astradns.namespace" . }}
  labels:
    {{- include "astradns.operator.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "astradns.operator.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "astradns.fullname" . }}-coredns-patcher
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: coredns-patcher
          image: {{ $clusterDNSKubectlImage | quote }}
          imagePullPolicy: {{ $clusterDNSKubectlImagePullPolicy | quote }}
          command:
            - /bin/sh
            - -ec
            - |
              namespace="{{ $clusterDNSNamespace }}"
              configmap="{{ $clusterDNSConfigMapName }}"
              forward_target="{{ $clusterDNSForwardTarget }}"
              fallback_upstream="{{ $clusterDNSFallbackUpstream }}"
              rollout_deployment="{{ $clusterDNSRolloutDeployment }}"
              profile="{{ $profile }}"
              auto_resolve_central_forward_target="{{ ternary "true" "false" $autoResolveCentralForwardTarget }}"
              central_service_name="{{ $centralServiceName }}"
              central_service_namespace="{{ $centralServiceNamespace }}"
              central_service_port="{{ $centralServicePort }}"

              corefile_path="/tmp/Corefile"
              backup_path="/tmp/Corefile.backup"
              patch_file="/tmp/patch.yaml"

              if [ "${profile}" = "central" ] && [ "${auto_resolve_central_forward_target}" = "true" ]; then
                service_cluster_ip="$(kubectl -n "${central_service_namespace}" get service "${central_service_name}" -o jsonpath='{.spec.clusterIP}')"
                if [ -z "${service_cluster_ip}" ] || [ "${service_cluster_ip}" = "None" ]; then
                  echo "Unable to resolve clusterIP for ${central_service_namespace}/${central_service_name}" >&2
                  exit 1
                fi

                case "${service_cluster_ip}" in
                  *:*)
                    forward_target="[${service_cluster_ip}]:${central_service_port}"
                    ;;
                  *)
                    forward_target="${service_cluster_ip}:${central_service_port}"
                    ;;
                esac
              fi

              kubectl -n "${namespace}" get configmap "${configmap}" -o jsonpath='{.data.Corefile}' > "${corefile_path}"
              cp "${corefile_path}" "${backup_path}"

              # Build the forward block with optional fallback
              if [ -n "${fallback_upstream}" ]; then
                forward_block="forward . ${forward_target} ${fallback_upstream} {\n        policy sequential\n    }"
              else
                forward_block="forward . ${forward_target}"
              fi

              if grep -Eq "forward \\. ${forward_target}([[:space:]]|$)" "${corefile_path}"; then
                echo "CoreDNS already forwards to ${forward_target}"
              elif grep -Eq 'forward \\. /etc/resolv\.conf([[:space:]]|$)' "${corefile_path}"; then
                awk -v block="${forward_block}" '/forward \. \/etc\/resolv\.conf/{printf "    %s\n", block; next}{print}' \
                  "${corefile_path}" > "${corefile_path}.tmp" && mv "${corefile_path}.tmp" "${corefile_path}"
                echo "Updated CoreDNS forward target from /etc/resolv.conf to ${forward_target} (fallback: ${fallback_upstream:-none})"
              elif grep -Eq 'forward \\. [^[:space:]]+([[:space:]]|$)' "${corefile_path}"; then
                awk -v block="${forward_block}" 'match($0, /forward \. [^ ]+/) && !done{printf "    %s\n", block; done=1; next}{print}' \
                  "${corefile_path}" > "${corefile_path}.tmp" && mv "${corefile_path}.tmp" "${corefile_path}"
                echo "Updated first CoreDNS forward target to ${forward_target} (fallback: ${fallback_upstream:-none})"
              else
                echo "No CoreDNS forward stanza found in ${namespace}/${configmap}" >&2
                exit 1
              fi

              {
                echo "data:"
                echo "  Corefile: |"
                sed 's/^/    /' "${corefile_path}"
                echo "  Corefile.astradns.backup: |"
                sed 's/^/    /' "${backup_path}"
              } > "${patch_file}"

              kubectl -n "${namespace}" patch configmap "${configmap}" --type merge --patch-file "${patch_file}"

              if [ -n "${rollout_deployment}" ]; then
                kubectl -n "${namespace}" rollout restart deployment/${rollout_deployment}
              fi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            {{- toYaml .Values.clusterDNS.forwardExternalToAstraDNS.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
