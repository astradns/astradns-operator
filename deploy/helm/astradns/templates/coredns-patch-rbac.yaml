{{- if .Values.clusterDNS.forwardExternalToAstraDNS.enabled }}
{{- $profile := include "astradns.agent.topology.profile" . }}
{{- if and (eq $profile "node-local") (ne (include "astradns.agent.network.mode" .) "linkLocal") }}
{{- fail "clusterDNS.forwardExternalToAstraDNS with profile=node-local requires agent.network.mode=linkLocal" }}
{{- end }}
{{- if ne (lower .Values.clusterDNS.provider) "coredns" }}
{{- fail "clusterDNS.forwardExternalToAstraDNS currently supports only clusterDNS.provider=coredns" }}
{{- end }}
{{- $clusterDNSNamespace := trim .Values.clusterDNS.forwardExternalToAstraDNS.namespace }}
{{- $clusterDNSConfigMapName := trim .Values.clusterDNS.forwardExternalToAstraDNS.configMapName }}
{{- $clusterDNSRolloutDeployment := trim .Values.clusterDNS.forwardExternalToAstraDNS.rolloutDeployment }}
{{- $dnsLabelPattern := "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$" }}
{{- $dnsSubdomainPattern := "^[a-z0-9]([-a-z0-9]*[a-z0-9])?([.][a-z0-9]([-a-z0-9]*[a-z0-9])?)*$" }}
{{- if eq $clusterDNSNamespace "" }}
{{- fail "clusterDNS.forwardExternalToAstraDNS.namespace must not be empty" }}
{{- end }}
{{- if not (regexMatch $dnsLabelPattern $clusterDNSNamespace) }}
{{- fail "clusterDNS.forwardExternalToAstraDNS.namespace must be a valid DNS-1123 label" }}
{{- end }}
{{- if eq $clusterDNSConfigMapName "" }}
{{- fail "clusterDNS.forwardExternalToAstraDNS.configMapName must not be empty" }}
{{- end }}
{{- if not (regexMatch $dnsSubdomainPattern $clusterDNSConfigMapName) }}
{{- fail "clusterDNS.forwardExternalToAstraDNS.configMapName must be a valid Kubernetes resource name" }}
{{- end }}
{{- if and $clusterDNSRolloutDeployment (not (regexMatch $dnsSubdomainPattern $clusterDNSRolloutDeployment)) }}
{{- fail "clusterDNS.forwardExternalToAstraDNS.rolloutDeployment must be a valid Kubernetes resource name when set" }}
{{- end }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "astradns.fullname" . }}-coredns-patcher
  namespace: {{ include "astradns.namespace" . }}
  labels:
    {{- include "astradns.operator.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "astradns.fullname" . }}-coredns-patcher
  namespace: {{ $clusterDNSNamespace }}
  labels:
    {{- include "astradns.operator.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
    resourceNames:
      - {{ $clusterDNSConfigMapName }}
    verbs:
      - get
      - patch
  {{- if $clusterDNSRolloutDeployment }}
  - apiGroups:
      - apps
    resources:
      - deployments
    resourceNames:
      - {{ $clusterDNSRolloutDeployment }}
    verbs:
      - get
      - patch
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "astradns.fullname" . }}-coredns-patcher
  namespace: {{ $clusterDNSNamespace }}
  labels:
    {{- include "astradns.operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "astradns.fullname" . }}-coredns-patcher
subjects:
  - kind: ServiceAccount
    name: {{ include "astradns.fullname" . }}-coredns-patcher
    namespace: {{ include "astradns.namespace" . }}
{{- end }}
