name: Release Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Bootstrap sibling repositories
        run: bash ./hack/bootstrap-monorepo.sh --with-agent

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Validate SemVer tag
        if: startsWith(github.ref, 'refs/tags/')
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          semver_regex='^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'
          if [[ ! "${RELEASE_TAG}" =~ ${semver_regex} ]]; then
            echo "invalid semver tag: ${RELEASE_TAG}" >&2
            exit 1
          fi

      - name: Verify release metadata
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            export RELEASE_TAG="${GITHUB_REF_NAME}"
          fi
          make release-check

      - name: Run release gate tests
        run: |
          make test
          make lint

      - name: Package Helm chart
        run: make package-chart

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM artifacts
        run: |
          mkdir -p dist
          syft dir:. -o cyclonedx-json=dist/astradns-operator-${{ github.ref_name }}-sbom.cdx.json
          syft dir:deploy/helm/astradns -o cyclonedx-json=dist/astradns-chart-${{ github.ref_name }}-sbom.cdx.json

      - name: Generate Artifact Hub metadata file
        env:
          ARTIFACTHUB_REPOSITORY_ID: ${{ vars.ARTIFACTHUB_REPOSITORY_ID }}
        run: |
          if [ -z "${ARTIFACTHUB_REPOSITORY_ID}" ]; then
            echo "ARTIFACTHUB_REPOSITORY_ID variable is required" >&2
            exit 1
          fi

          cat > dist/artifacthub-repo.yml <<EOF
          repositoryID: ${ARTIFACTHUB_REPOSITORY_ID}
          EOF

      - name: Login to GHCR for Helm chart publish
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${GH_TOKEN}" | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Publish Helm chart to GHCR OCI
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          chart_archive=$(ls dist/astradns-*.tgz)
          helm push "${chart_archive}" oci://ghcr.io/${{ github.repository_owner }}/helm-charts
          echo "oci://ghcr.io/${{ github.repository_owner }}/helm-charts/astradns:${{ github.ref_name }}" > dist/helm-chart-reference.txt

      - name: Write dry-run chart reference
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          echo "dry-run: chart publication is only executed on SemVer tags" > dist/helm-chart-reference.txt

      - name: Install ORAS
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          GOBIN="${HOME}/go/bin" go install oras.land/oras/cmd/oras@v1.2.3
          echo "${HOME}/go/bin" >> "$GITHUB_PATH"

      - name: Publish Artifact Hub repository metadata
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${GH_TOKEN}" | oras login ghcr.io --username "${{ github.actor }}" --password-stdin

          oras push \
            ghcr.io/${{ github.repository_owner }}/helm-charts/astradns:artifacthub.io \
            --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
            dist/artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: astradns-chart-${{ github.ref_name }}
          path: |
            dist/*.tgz
            dist/*-sbom.cdx.json
            dist/helm-chart-reference.txt
            dist/artifacthub-repo.yml

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tgz
            dist/*-sbom.cdx.json
            dist/helm-chart-reference.txt
            dist/artifacthub-repo.yml
